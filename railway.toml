[build]
builder = "nixpacks"

[deploy]
startCommand = "mkdir -p /app/storage/app/public /app/storage/app/livewire-tmp /tmp/livewire-tmp && php artisan storage:link && touch /app/storage/app/database.sqlite && php artisan migrate --force && php artisan db:seed --force && php artisan serve --host=0.0.0.0 --port=$PORT"
